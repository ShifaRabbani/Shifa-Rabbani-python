<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Mini Store</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Light Mode Palette */
            --bg-color: #f5f7fa;
            --text-color: #333333;
            --text-muted: #777777;
            --card-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.1);
            --primary: #6c5ce7;
            --primary-hover: #5b4bc4;
            --accent: #00cec9;
            --danger: #ff7675;
            --success: #00b894;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            --input-bg: rgba(0, 0, 0, 0.03);
            --input-focus: rgba(0, 0, 0, 0.05);
            --tab-bg: rgba(0, 0, 0, 0.05);
        }

        .dark-mode {
            /* Dark Mode Palette */
            --bg-color: #0d0e15;
            --text-color: #f0f0f0;
            --text-muted: #a0a0a0;
            --card-bg: rgba(20, 22, 35, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #8c7ae6;
            --primary-hover: #9c88ff;
            --accent: #48dbfb;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --input-bg: rgba(255, 255, 255, 0.03);
            --input-focus: rgba(255, 255, 255, 0.08);
            --tab-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* prevents scrollbars on desktop */
        }

        .auth-container {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: var(--bg-color);
        }

        /* Left Showcase */
        .auth-showcase {
            flex: 1.2;
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.8)), url('https://images.unsplash.com/photo-1618220179428-22790b46a011?q=80&w=1200&auto=format&fit=crop') center/cover;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 4rem;
        }

        .auth-showcase::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, transparent 0%, var(--bg-color) 100%);
            pointer-events: none;
        }

        .brand {
            position: relative; font-size: 1.5rem; font-weight: 700; color: white;
            display: flex; align-items: center; gap: 0.5rem; z-index: 10;
        }

        .brand .glow-icon { color: var(--primary); text-shadow: 0 0 12px var(--primary); }

        .showcase-content {
            position: relative; z-index: 10; max-width: 500px;
            margin-top: auto; margin-bottom: auto;
        }

        .showcase-content h1 {
            font-size: 3.5rem; line-height: 1.2; margin-bottom: 1.5rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .showcase-content p {
            font-size: 1.1rem; color: rgba(255,255,255,0.85); line-height: 1.6; margin-bottom: 3rem;
        }

        .showcase-indicator { display: flex; gap: 0.5rem; }
        .dot { width: 30px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; transition: 0.3s; }
        .dot.active { background: var(--primary); width: 60px; }

        /* Right Form Area */
        .auth-form-area {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 2rem; position: relative; z-index: 10;
            background: var(--bg-color);
        }

        .auth-form-wrapper { width: 100%; max-width: 420px; }

        .back-link {
            display: inline-flex; align-items: center; gap: 0.5rem;
            color: var(--text-muted); text-decoration: none; font-size: 0.9rem; margin-bottom: 2rem; transition: color 0.2s;
        }
        .back-link:hover { color: var(--text-color); }

        .auth-header { margin-bottom: 2rem; }
        .auth-header h2 { font-size: 2rem; margin-bottom: 0.5rem; font-weight: 600; color: var(--text-color); }
        .auth-header p { color: var(--text-muted); }

        .auth-tabs {
            display: flex; background: var(--tab-bg); border-radius: 12px; padding: 0.3rem; margin-bottom: 2rem;
        }
        .auth-tab {
            flex: 1; padding: 0.8rem; background: transparent; border: none;
            color: var(--text-muted); font-weight: 500; border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .auth-tab.active { background: var(--card-bg); color: var(--text-color); box-shadow: var(--shadow); }

        .social-login { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem;
            background: transparent; border: 1px solid var(--border-color); border-radius: 10px;
            color: var(--text-color); font-weight: 500; cursor: pointer; transition: 0.2s;
        }
        .social-btn:hover { background: var(--tab-bg); }
        .social-btn img { width: 20px; height: 20px; }

        .divider {
            display: flex; align-items: center; text-align: center; color: var(--text-muted);
            font-size: 0.85rem; margin-bottom: 1.5rem;
        }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
        .divider span { padding: 0 1rem; }

        .auth-form { animation: fadeIn 0.4s ease-out; }
        .auth-form.hidden { display: none; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group { margin-bottom: 1.2rem; }
        .input-group label {
            display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 500;
        }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.fa-envelope, .input-wrapper i.fa-lock, .input-wrapper i.fa-phone {
            position: absolute; left: 1rem; color: var(--text-muted);
        }
        .input-wrapper input {
            width: 100%; padding: 0.9rem 1rem 0.9rem 2.8rem;
            background: var(--input-bg); border: 1px solid var(--border-color);
            border-radius: 10px; color: var(--text-color); font-size: 1rem; outline: none; transition: 0.3s;
        }
        .input-wrapper input:focus { border-color: var(--primary); background: var(--input-focus); }
        .toggle-password {
            position: absolute; right: 1rem; background: none; border: none; color: var(--text-muted); cursor: pointer;
        }
        .toggle-password:hover { color: var(--text-color); }

        .form-options {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.85rem;
        }
        .remember-me { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); cursor: pointer; }
        .forgot-password { color: var(--primary); text-decoration: none; font-weight: 500; }
        .forgot-password:hover { text-decoration: underline; }

        .btn.primary-btn {
            width: 100%; padding: 1rem; background: var(--primary); color: white; border: none;
            border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3); display: flex; justify-content: center; align-items: center; gap: 0.5rem;
        }
        .btn.primary-btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4); }

        .error-msg { color: var(--danger); font-size: 0.85rem; margin-top: 0.5rem; text-align: center; height: 1rem; }

        /* Responsive Design */
        @media(max-width: 900px) {
            body { overflow: auto; /* allows scroll on mobile */ }
            .auth-container { flex-direction: column; height: auto; min-height: 100vh; }
            .auth-showcase { flex: none; height: 350px; padding: 2rem; }
            .auth-showcase::before { background: linear-gradient(to bottom, transparent 0%, var(--bg-color) 100%); }
            .showcase-content { max-width: 100%; margin-top: auto; }
            .showcase-content h1 { font-size: 2.5rem; }
            .auth-form-area { flex: none; padding: 2rem; }
            .auth-form-wrapper { max-width: 100%; }
        }
    </style>
</head>
<body>
    
    <!-- Script to apply theme before rendering to avoid flash of wrong color -->
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.body.classList.remove('dark-mode');
        } else {
            document.body.classList.add('dark-mode');
        }
    </script>

    <div class="auth-container">
        <!-- Left Showcase -->
        <div class="auth-showcase">
            <div class="brand">
                <i class="fa-solid fa-store glow-icon"></i> Mini Store
            </div>
            
            <div class="showcase-content">
                <h1 class="gradient-text">Elevate Your Aesthetics</h1>
                <p>Discover premium products curated to perfection with a seamless shopping experience. Join our community of aesthetic enthusiasts.</p>
                <div class="showcase-indicator">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </div>

        <!-- Right Form Area -->
        <div class="auth-form-area">
            <div class="auth-form-wrapper">
                <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Store</a>
                
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Please enter your details to sign in.</p>
                </div>

                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Log In</button>
                    <button class="auth-tab" onclick="switchTab('register')">Sign Up</button>
                </div>

                <div class="social-login">
                    <button class="social-btn"><img src="https://img.icons8.com/color/48/000000/google-logo.png" alt="Google"> Google</button>
                    <button class="social-btn"><i class="fa-brands fa-apple" style="font-size: 1.2rem; margin-right: 5px;"></i> Apple</button>
                </div>

                <div class="divider">
                    <span>or continue with email</span>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <div class="input-group">
                        <label for="login-email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="login-email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                            <button type="button" class="toggle-password"><i class="fa-regular fa-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox"> <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn primary-btn">Sign In</button>
                    <div id="login-error" class="error-msg"></div>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form hidden">
                    <div class="input-group">
                        <label for="reg-email">Email Address</label>
                        <div class="input-wrapper">
                            <i class="fa-regular fa-envelope"></i>
                            <input type="email" id="reg-email" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="reg-phone">Phone Number</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-phone"></i>
                            <input type="text" id="reg-phone" placeholder="Enter your phone number" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="reg-password">Password</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="reg-password" placeholder="Create a password" required>
                            <button type="button" class="toggle-password"><i class="fa-regular fa-eye"></i></button>
                        </div>
                    </div>
                    <button type="submit" class="btn primary-btn">Create Account</button>
                    <div id="reg-error" class="error-msg"></div>
                </form>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
            
            if(tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('login-form').classList.remove('hidden');
                document.querySelector('.auth-header h2').innerText = 'Welcome Back';
                document.querySelector('.auth-header p').innerText = 'Please enter your details to sign in.';
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('register-form').classList.remove('hidden');
                document.querySelector('.auth-header h2').innerText = 'Create an Account';
                document.querySelector('.auth-header p').innerText = 'Join us to discover premium aesthetic products.';
            }
        }

        // Toggle password visibility
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = this.previousElementSibling;
                if (input.type === 'password') {
                    input.type = 'text';
                    this.innerHTML = '<i class="fa-regular fa-eye-slash"></i>';
                } else {
                    input.type = 'password';
                    this.innerHTML = '<i class="fa-regular fa-eye"></i>';
                }
            });
        });

        // Handle Login
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const btn = e.target.querySelector('button[type="submit"]');
            const errBox = document.getElementById('login-error');
            const originalText = btn.innerHTML;
            
            errBox.innerText = '';
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Login failed');
                
                localStorage.setItem('token', data.access_token);
                window.location.href = 'index.html'; // Redirect to dashboard
            } catch (err) {
                errBox.innerText = err.message;
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // Handle Registration
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-phone').value;
            const password = document.getElementById('reg-password').value;
            const btn = e.target.querySelector('button[type="submit"]');
            const errBox = document.getElementById('reg-error');
            const originalText = btn.innerHTML;
            
            errBox.innerText = '';
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Creating...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, phone, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Registration failed');
                
                alert('Registration successful! Please sign in.');
                switchTab('login');
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
            } catch (err) {
                errBox.innerText = err.message;
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
